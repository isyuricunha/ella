name: Quote E2E Test

on:
  workflow_dispatch:

jobs:
  quote-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Create app token
        id: ella_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.ELLA_APP_CLIENT_ID }}
          private-key: ${{ secrets.ELLA_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-actions: read

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ steps.ella_token.outputs.token }}
          fetch-depth: 0

      - name: Write test README
        run: |
          printf 'hello world\n\n**a sentence to brighten your day:**<br>\n    old test quote\n\n' > README.md

      - name: Run Ella in quote mode
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          GITHUB_EVENT_NAME: schedule
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          ELLA_AI_BASE_URL: ${{ secrets.ELLA_AI_BASE_URL }}
          ELLA_AI_MODEL: ${{ secrets.ELLA_AI_MODEL }}
          ELLA_AI_API_KEY: ${{ secrets.ELLA_AI_API_KEY }}
          ELLA_AI_SMALL_MODEL: ${{ secrets.ELLA_AI_SMALL_MODEL }}
          ELLA_AI_SMALL_API_KEY: ${{ secrets.ELLA_AI_SMALL_API_KEY }}
          ELLA_AI_SMALL_BASE_URL: ${{ secrets.ELLA_AI_SMALL_BASE_URL }}
          YURI_COMMIT_NAME: ${{ secrets.YURI_COMMIT_NAME }}
          YURI_COMMIT_EMAIL: ${{ secrets.YURI_COMMIT_EMAIL }}
        run: |
          # Create a synthetic schedule event payload
          mkdir -p $RUNNER_TEMP/event
          cat > $RUNNER_TEMP/event.json << 'EOF'
          {"repository": {"default_branch": "test/quote-e2e", "owner": {"login": "isyuricunha"}}}
          EOF
          export GITHUB_EVENT_PATH=$RUNNER_TEMP/event.json
          python3 .ella/agent.py

      - name: Show README after
        run: cat README.md

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quote-e2e-debug-${{ github.run_id }}
          path: ${{ runner.temp }}/ella-output
          if-no-files-found: ignore
          retention-days: 1
