name: Ella Mizuki
# To enable weekly quote generation, add a schedule trigger to the on: block below:
#   schedule:
#     - cron: "0 0 * * 0"
# And add `github.event_name == 'schedule'` to the job if-condition.

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]
  pull_request_review:
    types: [submitted]
  workflow_run:
    workflows: ["*"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

jobs:
  ella-mizuki:
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.name != 'Ella Mizuki' && github.event.workflow_run.name != 'Release') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/ella') && github.event.comment.user.login == 'isyuricunha') ||
      (github.event_name == 'issues' && github.event.action == 'opened') ||
      (github.event_name == 'pull_request_target' && (github.event.action == 'opened' || github.event.action == 'synchronize')) ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested' && github.event.review.user.login == 'isyuricunha') ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    concurrency:
      group: ella-mizuki-${{ github.repository }}-${{ github.event.issue.number || github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number || github.run_id }}
      cancel-in-progress: false
      queue: max

    steps:
      - name: Create app token
        id: ella_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.ELLA_APP_CLIENT_ID }}
          private-key: ${{ secrets.ELLA_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-actions: read

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ steps.ella_token.outputs.token }}
          fetch-depth: 0

      - name: Run Ella
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}

          ELLA_AI_BASE_URL: ${{ secrets.ELLA_AI_BASE_URL }}
          ELLA_AI_MODEL: ${{ secrets.ELLA_AI_MODEL }}
          ELLA_AI_API_KEY: ${{ secrets.ELLA_AI_API_KEY }}

          ELLA_AI_SMALL_MODEL: ${{ secrets.ELLA_AI_SMALL_MODEL }}
          ELLA_AI_SMALL_API_KEY: ${{ secrets.ELLA_AI_SMALL_API_KEY }}
          ELLA_AI_SMALL_BASE_URL: ${{ secrets.ELLA_AI_SMALL_BASE_URL }}

          YURI_COMMIT_NAME: ${{ secrets.YURI_COMMIT_NAME }}
          YURI_COMMIT_EMAIL: ${{ secrets.YURI_COMMIT_EMAIL }}

          ELLA_MAX_ATTEMPTS: ${{ secrets.ELLA_MAX_ATTEMPTS }}
          ELLA_TIME_LIMIT_SECONDS: ${{ secrets.ELLA_TIME_LIMIT_SECONDS }}
          ELLA_CMD_RETRIES: ${{ secrets.ELLA_CMD_RETRIES }}

          ELLA_MAX_TOKENS_ASK: ${{ secrets.ELLA_MAX_TOKENS_ASK }}
          ELLA_MAX_TOKENS_PR: ${{ secrets.ELLA_MAX_TOKENS_PR }}
          ELLA_MAX_TOKENS_REVIEW: ${{ secrets.ELLA_MAX_TOKENS_REVIEW }}
          ELLA_MAX_TOKENS_PLAN: ${{ secrets.ELLA_MAX_TOKENS_PLAN }}
          ELLA_MAX_TOKENS_LABEL: ${{ secrets.ELLA_MAX_TOKENS_LABEL }}
          ELLA_MAX_TOKENS_FIX: ${{ secrets.ELLA_MAX_TOKENS_FIX }}
          ELLA_MAX_TOKENS_CONTINUE: ${{ secrets.ELLA_MAX_TOKENS_CONTINUE }}
          ELLA_MAX_TOKENS_SOLVE: ${{ secrets.ELLA_MAX_TOKENS_SOLVE }}
          ELLA_MAX_TOKENS_HEAL: ${{ secrets.ELLA_MAX_TOKENS_HEAL }}
          ELLA_MAX_TOKENS_TRIAGE: ${{ secrets.ELLA_MAX_TOKENS_TRIAGE }}
          ELLA_MAX_TOKENS_QUOTE: ${{ secrets.ELLA_MAX_TOKENS_QUOTE }}
          ELLA_MAX_TOKENS_WIKI: ${{ secrets.ELLA_MAX_TOKENS_WIKI }}

          ELLA_MAX_CONTEXT_PR_DIFF_BYTES: ${{ secrets.ELLA_MAX_CONTEXT_PR_DIFF_BYTES }}
          ELLA_MAX_CONTEXT_FILE_BYTES: ${{ secrets.ELLA_MAX_CONTEXT_FILE_BYTES }}
          ELLA_MAX_CONTEXT_REQUESTED_FILE_BYTES: ${{ secrets.ELLA_MAX_CONTEXT_REQUESTED_FILE_BYTES }}
          ELLA_MAX_CONTEXT_REPO_FILES_BYTES: ${{ secrets.ELLA_MAX_CONTEXT_REPO_FILES_BYTES }}
        run: |
          python3 .ella/agent.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ella-mizuki-debug-${{ github.run_id }}
          path: ${{ runner.temp }}/ella-output
          if-no-files-found: ignore
          retention-days: 3
