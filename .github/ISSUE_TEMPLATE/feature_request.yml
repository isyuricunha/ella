name: Feature Request
description: Suggest an idea for Ella
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a new feature!
        Please note that Ella is primarily designed as a GitHub-native AI Agent.

        ### Useful Links:
        - [Full Documentation](https://github.com/isyuricunha/ella/tree/main/docs)
        - [Commands Reference](https://github.com/isyuricunha/ella/blob/main/docs/commands.md)
  - type: checkboxes
    id: checklist
    attributes:
      label: Search Existing Issues
      options:
        - label: I have searched the existing issues and found no similar feature requests.
          required: true
  - type: dropdown
    id: area
    attributes:
      label: Which area of Ella does this feature relate to?
      options:
        - Triage (issue classification, duplicate detection, labeling)
        - Review (PR code review)
        - Fix/Solve (autonomous code fixes)
        - Commands (ask, pr, plan, label, wiki, help)
        - Configuration (secrets, environment variables, workflow)
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false
  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
    validations:
      required: false
