name: 'Ella Mizuki AI Agent'
description: 'A powerful, autonomous AI agent that lives directly inside GitHub repositories.'
branding:
  icon: 'cpu'
  color: 'purple'
inputs:
  ella_app_client_id:
    description: 'GitHub App Client ID for authentication'
    required: true
  ella_app_private_key:
    description: 'GitHub App Private Key for authentication'
    required: true
  ai_base_url:
    description: 'Base URL for the OpenAI-compatible LLM API (large model)'
    required: true
  ai_model:
    description: 'Model name for coding tasks and reviews'
    required: true
  ai_api_key:
    description: 'API key for the large model provider'
    required: true
  ai_small_model:
    description: 'Smaller model name for read-only/conversational tasks. Defaults to ai_model.'
    required: false
  ai_small_api_key:
    description: 'API key for the small model provider. Defaults to ai_api_key.'
    required: false
  ai_small_base_url:
    description: 'Base URL for the small model. Defaults to ai_base_url.'
    required: false
  yuri_commit_name:
    description: 'Git author name for commit metadata'
    required: false
  yuri_commit_email:
    description: 'Git author email for commit metadata'
    required: false
  ella_max_attempts:
    description: 'Max loops for fix/solve/heal attempts (default 25 + 2 per allowed file, capped 300)'
    required: false
  ella_time_limit_seconds:
    description: 'Max execution time in seconds (default 3600)'
    required: false
  ella_cmd_retries:
    description: 'Max retries for transient gh/git/AI failures (default 3, exponential backoff)'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Create app token
      id: ella_token
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ inputs.ella_app_client_id }}
        private-key: ${{ inputs.ella_app_private_key }}
        permission-contents: write
        permission-issues: write
        permission-pull-requests: write
        permission-actions: read

    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        token: ${{ steps.ella_token.outputs.token }}
        fetch-depth: 0

    - name: Run Ella
      shell: bash
      env:
        GH_TOKEN: ${{ steps.ella_token.outputs.token }}
        ELLA_AI_BASE_URL: ${{ inputs.ai_base_url }}
        ELLA_AI_MODEL: ${{ inputs.ai_model }}
        ELLA_AI_API_KEY: ${{ inputs.ai_api_key }}
        ELLA_AI_SMALL_MODEL: ${{ inputs.ai_small_model }}
        ELLA_AI_SMALL_API_KEY: ${{ inputs.ai_small_api_key }}
        ELLA_AI_SMALL_BASE_URL: ${{ inputs.ai_small_base_url }}
        YURI_COMMIT_NAME: ${{ inputs.yuri_commit_name }}
        YURI_COMMIT_EMAIL: ${{ inputs.yuri_commit_email }}
        ELLA_MAX_ATTEMPTS: ${{ inputs.ella_max_attempts }}
        ELLA_TIME_LIMIT_SECONDS: ${{ inputs.ella_time_limit_seconds }}
        ELLA_CMD_RETRIES: ${{ inputs.ella_cmd_retries }}
      run: |
        python3 ${{ github.action_path }}/.ella/agent.py
